name: Build and deploy ASP.Net Core app to Azure Web App - ipro-prod-admin

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: dotnet restore IPRO.sln

      - name: Build
        run: dotnet build IPRO.sln --configuration Release --no-restore

      - name: Publish admin app
        run: dotnet publish src/IPRO.Admin/IPRO.Admin.csproj -c Release -o ./publish-admin

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: admin-app
          path: ./publish-admin

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: admin-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ipro-prod-admin'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_IPRO_PROD_ADMIN }}
          package: .
